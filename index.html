<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o meu amoreco</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* FUNDO COM SENSAÇÃO DE RESPIRAÇÃO */
        body {
            background: linear-gradient(-45deg, #ff3366 0%, #d90429 30%, #4a0080 60%, #000033 85%, #050505 100%);
            background-size: 400% 400%;
            animation: respiracao 8s ease-in-out infinite;
            min-height: 100vh;
            margin: 0;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes respiracao {
            0% { background-position: 0% 50%; }
            50% { background-position: 85% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- TELA DE BLOQUEIO (SENHA) --- */
        #tela-bloqueio {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(-45deg, #4a0080, #050505, #ff3366);
            background-size: 300% 300%;
            animation: respiracao 5s ease infinite;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #senha-amor {
            padding: 15px;
            border-radius: 25px;
            border: 2px solid #ff3366;
            font-size: 1.2em;
            text-align: center;
            margin: 20px 0;
            width: 80%;
            max-width: 300px;
            outline: none;
            color: #333;
        }

        #erro-senha {
            color: #ffb3c6;
            font-weight: bold;
            display: none;
            margin-top: 10px;
            animation: tremer 0.3s;
        }

        @keyframes tremer {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Oculta o conteúdo do site até ela acertar a senha */
        #conteudo-principal {
            display: none;
            padding: 30px 10px;
        }

        /* --- CHUVA DE PÉTALAS --- */
        .petala {
            position: fixed;
            top: -10%;
            z-index: 99999;
            font-size: 25px;
            pointer-events: none;
            animation: cairPetala linear forwards;
        }

        @keyframes cairPetala {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg) scale(0.8); opacity: 0; }
        }

        /* --- TÍTULO ROMÂNTICO --- */
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4em;
            margin-top: 10px;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 0 0 5px #ff3366, 0 0 10px #ff3366, 0 0 20px #ff3366, 0 0 40px #ff3366;
            animation: pulsarTitulo 3s ease-in-out infinite;
            position: relative;
            z-index: 10;
        }

        @keyframes pulsarTitulo {
            0%, 100% { transform: scale(1); text-shadow: 0 0 5px #ff3366, 0 0 10px #ff3366, 0 0 20px #ff3366; }
            50% { transform: scale(1.05); text-shadow: 0 0 10px #ff3366, 0 0 20px #ff3366, 0 0 40px #ff3366, 0 0 60px #ff3366; }
        }

        /* --- COROA FLUTUANTE DA RAINHA --- */
        .coroa-rainha {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5em;
            z-index: 20;
            animation: flutuarCoroa 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes flutuarCoroa {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(-5deg); }
            50% { transform: translateX(-50%) translateY(-15px) rotate(5deg); }
        }

        /* --- FOTO PRINCIPAL E EFEITO GLOW --- */
        .container-foto {
            position: relative;
            display: block;
            margin: 30px auto;
            width: fit-content;
            cursor: pointer; 
        }

        .foto-casal {
            width: 250px; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 50%;
            object-position: 10% 5%; 
            padding: 12px;
            background: linear-gradient(45deg, #ff3366, #9933ff, #33ccff, #ff3366);
            background-size: 200% 200%;
            animation: moverCores 4s ease infinite;
            box-shadow: 0 6px 17px rgba(0,0,0,0.4);
            display: block;
            margin: 0 auto; 
            position: relative; 
            z-index: 10;
            transition: all 0.4s ease; 
        }

        .foto-brilho-ativo {
            box-shadow: 0 0 30px #ff3366, 0 0 60px #ff3366, 0 0 90px #ffd700 !important;
            transform: scale(1.05);
        }

        .texto-escondido-foto {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1em;
            z-index: 30;
            pointer-events: none;
            opacity: 0; 
            transition: opacity 0.4s ease;
            width: 220px;
            text-align: center;
            border: 2px solid #ff3366;
            text-shadow: 1px 1px 5px #ff3366;
        }

        /* --- CÉU ESTRELADO --- */
        #estrelas-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 1;
        }
        .estrela {
            position: absolute; background: white; border-radius: 50%; opacity: 0.7;
            animation: brilhar var(--duracao) infinite;
        }
        @keyframes brilhar {
            0%, 100% { opacity: 0.6; transform: scale(1); } 
            50% { opacity: 0.8; transform: scale(1.7); } 
        }

        /* --- RASTRO DE CORAÇÕES --- */
        .coracao-rastro {
            position: fixed; pointer-events: none; z-index: 9999; font-size: 20px;
            animation: rastro-anim 1s ease-out forwards;
        }
        @keyframes rastro-anim {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150%) scale(0.3); opacity: 0; }
        }

        /* --- BALÕES COM AS FRASES DELA --- */
        .balao-frase {
            position: fixed; background: rgba(255, 255, 255, 0.95); color: #d90429;
            padding: 10px 18px; border-radius: 20px; font-weight: bold; font-size: 0.9em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); pointer-events: none; z-index: 9998;
            max-width: 70vw; animation: flutuarBalao 4s ease-in-out forwards;
        }
        .balao-frase::after {
            content: ''; position: absolute; bottom: -8px; left: 20px;
            border-width: 10px 10px 0 0; border-style: solid;
            border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent;
        }
        @keyframes flutuarBalao {
            0% { transform: translateY(20px) scale(0.8); opacity: 0; }
            20% { transform: translateY(0) scale(1); opacity: 1; }
            80% { transform: translateY(-30px) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(0.8); opacity: 0; }
        }

       /* --- A CARTA INTERATIVA --- */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 280px; 
            margin: 50px auto; 
            perspective: 1000px; 
            z-index: 10;
        }

        .envelope-costas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #a6001b;
            border-radius: 10px;
            z-index: 1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .carta-papel {
            position: absolute;
            top: 10px; left: 10px; right: 10px; 
            height: 260px; 
            background: #fffafa;
            border-radius: 5px;
            padding: 20px 15px;
            box-sizing: border-box;
            z-index: 2;
            transition: transform 0.8s ease 0.4s; 
            color: #333;
            font-style: italic;
            font-size: 0.9em;
            line-height: 1.4; 
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            overflow-y: auto; 
            scrollbar-width: thin;
            scrollbar-color: #ff3366 transparent;
        }

        .envelope-frente {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #e60026;
            border-radius: 10px;
            z-index: 3;
            clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 0 100%);
            transition: opacity 0.5s ease 0.4s; 
            pointer-events: none;
        }

        .envelope-aba {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60%;
            background: #ff1a40;
            border-radius: 10px 10px 0 0;
            z-index: 4; 
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top; 
            pointer-events: none;
        }

        .laco-arrastavel {
            position: absolute;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: #fff;
            color: #d90429;
            padding: 8px 15px;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: grab;
            user-select: none; 
            transition: opacity 0.3s ease;
            border: 2px solid #d90429;
            white-space: nowrap;
        }

        .laco-arrastavel:active { cursor: grabbing; }

        .envelope-wrapper.aberto .envelope-aba {
            animation: dobrarAbaParaTras 1.2s forwards ease-in-out;
        }

        @keyframes dobrarAbaParaTras {
            0% { transform: rotateX(0deg); z-index: 4; }
            40% { transform: rotateX(180deg); z-index: 4; } 
            50% { transform: rotateX(180deg); z-index: 1; } 
            100% { transform: rotateX(0deg); z-index: 1; } 
        }

        .envelope-wrapper.aberto .carta-papel { transform: translateY(0); z-index: 5; }
        .envelope-wrapper.aberto .envelope-frente { opacity: 0; }
        .laco-arrastavel.sumir { opacity: 0; pointer-events: none; }

        /* --- POTE DE VAGALUMES --- */
        .pote-container { position: relative; width: 120px; height: 180px; margin: 30px auto; cursor: pointer; }
        .pote-vidro {
            width: 100%; height: 100%; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 40px 40px 20px 20px; backdrop-filter: blur(5px); box-shadow: inset 0 0 20px rgba(255,255,255,0.2), 0 10px 20px rgba(0,0,0,0.5);
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .pote-tampa {
            position: absolute; top: -15px; left: 10%; width: 80%; height: 30px; background: #8B4513;
            border-radius: 10px; border: 2px solid #5c2e0b; transition: 0.5s; z-index: 2;
        }
        .vagalume {
            position: absolute; width: 8px; height: 8px; background: #e0ff33; border-radius: 50%;
            box-shadow: 0 0 15px 5px rgba(224, 255, 51, 0.8); animation: vagalumeVoa 4s infinite alternate ease-in-out;
        }
        .v1 { top: 70%; left: 30%; animation-duration: 3s; }
        .v2 { top: 40%; left: 60%; animation-duration: 5s; animation-delay: 1s; }
        .v3 { top: 80%; left: 70%; animation-duration: 4.5s; animation-delay: 0.5s; }
        
        @keyframes vagalumeVoa { 0% { transform: translate(0, 0) scale(1); opacity: 0.8; } 100% { transform: translate(20px, -30px) scale(1.3); opacity: 1; } }
        
        .pote-container.aberto .pote-tampa { transform: translateY(-30px) rotate(15deg); opacity: 0; }
        .pote-container.aberto .pote-vidro { box-shadow: inset 0 0 40px rgba(224, 255, 51, 0.5), 0 0 30px rgba(224, 255, 51, 0.5); }
        .motivo-box { margin: 10px auto 30px auto; min-height: 40px; font-size: 1.1em; font-weight: bold; color: #e0ff33; text-shadow: 0 0 10px rgba(224, 255, 51, 0.5); opacity: 0; transition: 0.5s; max-width: 90%; }

        /* BOTÕES */
        .botao-estilo {
            background: linear-gradient(45deg, #ff3366, #9933ff); color: white; border: none; padding: 12px 25px;
            font-weight: bold; border-radius: 25px; cursor: pointer; margin: 10px auto;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-decoration: none; display: inline-block;
            position: relative; z-index: 10;
        }

        .caixa-cronometro {
            background-color: rgba(255, 255, 255, 0.15); padding: 15px; border-radius: 15px;
            display: inline-block; margin: 20px 0; position: relative; z-index: 10;
        }

        /* MODAL DE HOMENAGEM AO PAI */
        .modal-pai {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(5px); justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-conteudo-pai {
            background: linear-gradient(135deg, #2a0845 0%, #6441A5 100%); padding: 30px;
            border-radius: 20px; text-align: center; max-width: 400px; width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.2); animation: zoomIn 0.5s ease;
        }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .foto-pai-estilo {
            width: 220px; height: 220px; max-width: 100%; object-fit: cover; border-radius: 50%;
            border: 4px solid white; margin: 0 auto 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: block; 
        }
        
        .texto-pai {
            color: white; font-size: 1.15em; line-height: 1.5; font-style: italic;
            text-align: center; margin: 0 auto; width: 95%; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /*
